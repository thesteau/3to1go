<dialog id="credential-dialog" class="modal" aria-labelledby="credential-dialog-title">
  <div class="modal-card">
    <div class="modal-head">
      <div>
        <h2 id="credential-dialog-title">Mint Edge Credential</h2>
        <p class="hint">The credential is shown once. Paste it into Edge settings before closing this dialog.</p>
      </div>
      <button type="button" class="secondary" onclick="closeDialog('credential-dialog')">Close</button>
    </div>

    <label for="credential_ttl_days">TTL Days</label>
    <input id="credential_ttl_days" type="number" min="1" max="3650" value="365">

    <label class="checkbox" for="credential_shared">
      <input id="credential_shared" type="checkbox" onchange="handleCredentialSharedToggle()">
      <span>Shared credential</span>
    </label>

    <label for="credential_max_registrations">Shared Instance Limit</label>
    <input id="credential_max_registrations" type="number" min="1" max="10000" value="1" disabled>
    <p class="hint">Single credentials bind to the first Edge instance that reports in. Tokens can be revoked from Central only after an Edge instance has reported in with them, or they can expire naturally.</p>

    <label for="credential_output">Credential</label>
    <textarea id="credential_output" class="credential-output" readonly></textarea>

    <div class="toolbar">
      <button type="button" onclick="mintCredential()">Mint Credential</button>
      <button type="button" class="secondary" onclick="copyMintedCredential()">Copy</button>
      <span class="hint status-line" id="credential-status"></span>
    </div>
  </div>
</dialog>
