<dialog id="login-dialog" class="modal" aria-labelledby="login-dialog-title">
  <div class="modal-card auth-card">
    <div class="modal-head">
      <div>
        <h2 id="login-dialog-title">Sign In</h2>
        <p class="hint">Sign in with your administrator account.</p>
      </div>
    </div>
    <label for="login_username">Username</label>
    <input id="login_username" autocomplete="username" value="admin">
    <label for="login_password">Password</label>
    <input id="login_password" type="password" autocomplete="current-password">
    <div class="toolbar">
      <button type="button" onclick="loginUser()">Sign In</button>
      <span class="hint status-line" id="login-status"></span>
    </div>
  </div>
</dialog>
