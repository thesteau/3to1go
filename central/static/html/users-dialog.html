<dialog id="users-dialog" class="modal" aria-labelledby="users-dialog-title">
  <div class="modal-card">
    <div class="modal-head">
      <div>
        <h2 id="users-dialog-title">Users & Access</h2>
        <p class="hint">Admins can add users, remove users, reset passwords, and assign admin access.</p>
      </div>
      <button type="button" class="secondary" onclick="closeDialog('users-dialog')">Close</button>
    </div>
    <div id="users-list"></div>
    <div class="hook-section admin-only" id="add-user-section" hidden>
      <h3>Add User</h3>
      <div class="user-form">
        <input id="new_user_username" placeholder="username">
        <input id="new_user_password" type="password" placeholder="temporary password" minlength="5">
        <label class="checkbox">
          <input type="checkbox" id="new_user_admin">
          <span>Admin</span>
        </label>
      </div>
      <div class="toolbar">
        <button type="button" onclick="createUser()">Add User</button>
      </div>
    </div>
    <div class="toolbar">
      <button type="button" class="secondary" onclick="openPasswordDialog(false)">Change My Password</button>
      <button type="button" class="secondary" onclick="logoutUser()">Sign Out</button>
    </div>
    <div class="dialog-icon-links">
      <a href="https://github.com/thesteau/3to1go" target="_blank" rel="noopener noreferrer" class="icon-link" aria-label="GitHub project">
        <svg role="img" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
      </a>
      <a href="https://buymeacoffee.com/thesteau" target="_blank" rel="noopener noreferrer" class="icon-link" aria-label="Support on Buy Me a Coffee">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20 3H4v10c0 2.21 1.79 4 4 4h6c2.21 0 4-1.79 4-4v-3h2c1.11 0 2-.89 2-2V5c0-1.11-.89-2-2-2zm0 5h-2V5h2v3zM4 19h16v2H4z"/></svg>

  </div>
</dialog>
