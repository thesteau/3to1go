services:
  edge:
    build: .
    env_file:
      - ./.env
    ports:
      - "8080:8080"
    volumes:
      - ./data/scan_root:/scan
      - ./data/state:/data/state
      - ./data/spool:/data/spool
      # Optional for docker-native job quiescing:
      # - /var/run/docker.sock:/var/run/docker.sock
      # - /srv/stacks:/srv/stacks:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
