services:
  edge:
    build: .
    env_file:
      - ./.env
    ports:
      - "8080:8080"
    volumes:
      - ./config:/config
      - ./scan:/scan
      - ./state:/data/state
      - ./spool:/data/spool
      - ./secrets:/run/secrets:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import os, urllib.request; port=os.getenv('HTTP_PORT','8080'); urllib.request.urlopen(f'http://127.0.0.1:{port}/health', timeout=5).read()"
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
