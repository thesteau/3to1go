services:
  edge:
    build: .
    env_file:
      - ./.env
    ports:
      - "8080:8080"
    volumes:
      - ./data/scan_root:/scan
      - ./data/state:/data/state
      - ./data/spool:/data/spool
      - ./secrets/relay_auth_token:/run/secrets/relay_auth_token:ro
      # Uncomment when using is_docker_composed=true jobs on this host.
      # Edge only needs the host Docker socket because the image contains the
      # Docker CLI and Compose plugin, not its own Docker daemon.
      # - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import os, urllib.request; port=os.getenv('HTTP_PORT','8080'); urllib.request.urlopen(f'http://127.0.0.1:{port}/health', timeout=5).read()"
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
