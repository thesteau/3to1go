services:
  edge:
    build: .
    env_file:
      - ./.env
    ports:
      - "8080:8080"
    volumes:
      - ./data/scan_root:/scan
      - ./data/state:/data/state
      - ./data/spool:/data/spool
      - ../.relay-secrets:/run/relay-secrets
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
