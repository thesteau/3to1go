<dialog id="hook-view-dialog" class="modal" aria-labelledby="hook-view-dialog-title">
  <div class="modal-card">
    <div class="modal-head">
      <div>
        <h2 id="hook-view-dialog-title">View Script</h2>
        <p class="hint" id="hook-view-filename"></p>
      </div>
      <button type="button" class="secondary" onclick="closeDialog('hook-view-dialog')">Close</button>
    </div>
    <textarea id="hook-view-content" class="hook-viewer" readonly></textarea>
  </div>
</dialog>
