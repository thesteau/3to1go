<dialog id="password-dialog" class="modal" aria-labelledby="password-dialog-title">
  <div class="modal-card auth-card">
    <div class="modal-head">
      <div>
        <h2 id="password-dialog-title">Change Password</h2>
        <p class="hint" id="password-dialog-message">Choose a new password before continuing.</p>
      </div>
    </div>
    <label for="current_password">Current Password</label>
    <input id="current_password" type="password" autocomplete="current-password">
    <label for="new_password">New Password</label>
    <input id="new_password" type="password" autocomplete="new-password" minlength="5">
    <label for="confirm_new_password">Confirm New Password</label>
    <input id="confirm_new_password" type="password" autocomplete="new-password" minlength="5">
    <div class="toolbar">
      <button type="button" onclick="changeOwnPassword()">Save Password</button>
      <button type="button" class="secondary" id="password-cancel" onclick="closeDialog('password-dialog')">Cancel</button>
    </div>
  </div>
</dialog>
