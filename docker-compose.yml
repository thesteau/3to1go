services:
  central:
    build:
      context: .
      dockerfile: central/Dockerfile
    env_file:
      - ./central/.env
    ports:
      - "8000:8000"
    volumes:
      - ./.data/central_backups:/backups
      - ./.data/central_staging:/staging
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  edge:
    build:
      context: .
      dockerfile: edge/Dockerfile
    env_file:
      - ./edge/.env
    depends_on:
      central:
        condition: service_healthy
    volumes:
      - ./.data/edge_scan_root:/scan:ro
      - ./.data/edge_state:/data/state
      - ./.data/edge_spool:/data/spool
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

