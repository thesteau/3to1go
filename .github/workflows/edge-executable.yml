name: Build Edge Packages

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-edge:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install -r edge/requirements.txt

      - name: Run Edge unit tests
        run: python -m unittest edge.tests.test_job_processor edge.tests.test_discovery

  build-edge:
    needs: verify-edge
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            bundle_asset_name: relaycentralizer-edge-linux-bundle
            bundle_filename: relaycentralizer-edge-linux.tar.gz
            installer_asset_name: relaycentralizer-edge-linux-deb
            installer_filename: relaycentralizer-edge-linux.deb
          - os: macos-latest
            bundle_asset_name: relaycentralizer-edge-macos-bundle
            bundle_filename: relaycentralizer-edge-macos.tar.gz
            installer_asset_name: relaycentralizer-edge-macos-pkg
            installer_filename: relaycentralizer-edge-macos.pkg
          - os: windows-latest
            bundle_asset_name: relaycentralizer-edge-windows-bundle
            bundle_filename: relaycentralizer-edge-windows.zip
            installer_asset_name: relaycentralizer-edge-windows-installer
            installer_filename: relaycentralizer-edge-windows-installer.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set Edge version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME.TrimStart("v")
          } else {
            $version = "0.1.0+$($env:GITHUB_SHA.Substring(0,7))"
          }
          $debVersion = $version -replace '[^0-9A-Za-z.+:~-]', '.'
          $pkgVersion = $version -replace '[^0-9A-Za-z.]', '.'
          "EDGE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "EDGE_DEB_VERSION=$debVersion" | Out-File -FilePath $env:GITHUB_ENV -Append
          "EDGE_PKG_VERSION=$pkgVersion" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Edge build dependencies
        run: python -m pip install -r edge/requirements.txt pyinstaller

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Edge executable bundle
        run: pyinstaller edge/relaycentralizer-edge.spec --clean

      - name: Archive Edge bundle on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd dist
          tar -czf "${{ matrix.bundle_filename }}" relaycentralizer-edge

      - name: Archive Edge bundle on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/relaycentralizer-edge -DestinationPath dist/${{ matrix.bundle_filename }}

      - name: Build Linux Debian package
        if: runner.os == 'Linux'
        shell: bash
        run: |
          rm -rf package/linux
          mkdir -p package/linux/root/opt/relaycentralizer-edge
          mkdir -p package/linux/root/etc/relaycentralizer-edge
          mkdir -p package/linux/root/lib/systemd/system
          mkdir -p package/linux/DEBIAN
          cp -R dist/relaycentralizer-edge/. package/linux/root/opt/relaycentralizer-edge/
          cp edge/packaging/linux/edge.env.sample package/linux/root/etc/relaycentralizer-edge/edge.env.sample
          cp edge/packaging/linux/relaycentralizer-edge.service package/linux/root/lib/systemd/system/relaycentralizer-edge.service
          install -m 0755 edge/packaging/linux/postinst package/linux/DEBIAN/postinst
          install -m 0755 edge/packaging/linux/prerm package/linux/DEBIAN/prerm
          install -m 0755 edge/packaging/linux/postrm package/linux/DEBIAN/postrm
          printf '%s\n' \
            'Package: relaycentralizer-edge' \
            "Version: ${EDGE_DEB_VERSION}" \
            'Section: utils' \
            'Priority: optional' \
            'Architecture: amd64' \
            'Maintainer: RelayCentralizer' \
            'Depends: libc6' \
            'Description: RelayCentralizer Edge host agent' \
            ' Host-native RelayCentralizer Edge scanner and uploader.' \
            > package/linux/DEBIAN/control
          dpkg-deb --build package/linux "dist/${{ matrix.installer_filename }}"

      - name: Build macOS package
        if: runner.os == 'macOS'
        shell: bash
        run: |
          rm -rf package/macos
          mkdir -p package/macos/root/usr/local/lib/relaycentralizer-edge
          mkdir -p package/macos/root/usr/local/etc/relaycentralizer-edge
          mkdir -p package/macos/root/Library/LaunchDaemons
          cp -R dist/relaycentralizer-edge/. package/macos/root/usr/local/lib/relaycentralizer-edge/
          cp edge/packaging/macos/edge.env.sample package/macos/root/usr/local/etc/relaycentralizer-edge/edge.env.sample
          cp edge/packaging/macos/com.relaycentralizer.edge.plist package/macos/root/Library/LaunchDaemons/com.relaycentralizer.edge.plist
          pkgbuild \
            --root package/macos/root \
            --identifier com.relaycentralizer.edge \
            --version "${EDGE_PKG_VERSION}" \
            --scripts edge/packaging/macos/scripts \
            "dist/${{ matrix.installer_filename }}"

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:EDGE_SOURCE_DIR = (Resolve-Path "dist/relaycentralizer-edge").Path
          $env:EDGE_OUTPUT_DIR = (Resolve-Path "dist").Path
          $env:EDGE_REPO_ROOT = (Resolve-Path ".").Path
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "edge\packaging\windows\relaycentralizer-edge.iss"
          Move-Item -Path "dist\relaycentralizer-edge-windows-installer.exe" -Destination "dist\${{ matrix.installer_filename }}" -Force

      - name: Upload Edge bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bundle_asset_name }}
          path: dist/${{ matrix.bundle_filename }}

      - name: Upload Edge installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.installer_asset_name }}
          path: dist/${{ matrix.installer_filename }}

      - name: Publish Edge release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.bundle_filename }}
            dist/${{ matrix.installer_filename }}
