name: build-edge

on:
  pull_request:
    paths:
      - 'edge/**'
      - '.github/workflows/build-edge.yml'
  push:
    branches:
      - main
    paths:
      - 'edge/**'
      - '.github/workflows/build-edge.yml'
  workflow_dispatch:

jobs:
  build-edge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./edge
          file: ./edge/Dockerfile
          tags: relaycentralizer-edge:ci
          outputs: type=oci,dest=/tmp/relaycentralizer-edge.oci.tar
      - uses: actions/upload-artifact@v4
        with:
          name: relaycentralizer-edge-image
          path: /tmp/relaycentralizer-edge.oci.tar
