name: build-central

on:
  pull_request:
    paths:
      - 'central/**'
      - '.github/workflows/build-central.yml'
  push:
    branches:
      - main
    paths:
      - 'central/**'
      - '.github/workflows/build-central.yml'
  workflow_dispatch:

jobs:
  build-central:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./central
          file: ./central/Dockerfile
          tags: relaycentralizer-central:ci
          outputs: type=oci,dest=/tmp/relaycentralizer-central.oci.tar
      - uses: actions/upload-artifact@v4
        with:
          name: relaycentralizer-central-image
          path: /tmp/relaycentralizer-central.oci.tar
