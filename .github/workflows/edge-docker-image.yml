name: Build Edge Docker Image

on:
  push:
    branches: ["main"]
    paths:
      - "edge/**"
      - ".github/workflows/edge-docker-image.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-edge:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./edge
          file: ./edge/Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-edge:latest
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-edge:${{ env.SHORT_SHA }}
