services:
  edge:
    image: ghcr.io/thesteau/relay-centralizer-edge:latest
    env_file:
      - ./.env
    ports:
      - "6556:6556"
    volumes:
      - ./config:/config
      - ${SCAN_DIR:-./scan}:/scan
      - ./state:/data/state
      - ./spool:/data/spool
      - ./secrets:/run/secrets:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
