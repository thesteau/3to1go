services:
  edge:
    image: ghcr.io/thesteau/relay-centralizer-edge:latest
    env_file:
      - ./.env
    ports:
      - "6556:8080"
    volumes:
      - ./config:/config
      - ./data/scan_root:/scan
      - ./data/state:/data/state
      - ./data/spool:/data/spool
      - ./secrets/relay_auth_token:/run/secrets/relay_auth_token:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
