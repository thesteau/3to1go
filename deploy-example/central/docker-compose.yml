services:
  central:
    container_name: relay-central
    image: ghcr.io/thesteau/relay-centralizer-central:latest
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "6555:6555"
    volumes:
      - ./config:/config
      - ./hook-scripts:/config/hook-scripts
      # TODO(remove after migration window): legacy nested hook path.
      - ./hook-scripts:/config/RelayCentralizerCentral/hook-scripts
      - ${BACKUP_DIR:-./data/backups}:/backups
      - ./data/staging:/staging
      - ./secrets:/run/secrets
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    container_name: relay-central-db
    image: postgres:17-alpine
    env_file:
      - ./.env
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
