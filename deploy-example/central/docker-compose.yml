services:
  central:
    image: ghcr.io/thesteau/relay-centralizer-central:latest
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "6555:8000"
    volumes:
      - ./config:/config
      - ./data/backups:/backups
      - ./data/staging:/staging
      - ./secrets:/run/secrets
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import os, urllib.request; port=os.getenv('HTTP_PORT','8000'); urllib.request.urlopen(f'http://127.0.0.1:{port}/health/ready', timeout=5).read()"
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:17-alpine
    env_file:
      - ./.env
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
