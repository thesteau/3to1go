services:
  central:
    build: .
    env_file:
      - ./.env
    ports:
      - "6555:8000"
    volumes:
      - ./data/backups:/backups
      - ./data/staging:/staging
      - ./secrets/relay_auth_token:/run/secrets/relay_auth_token:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import os, urllib.request; port=os.getenv('HTTP_PORT','8000'); urllib.request.urlopen(f'http://127.0.0.1:{port}/health/ready', timeout=5).read()"
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
